# pre-commit hooks configuration
# 2025年最新ベストプラクティス対応
# https://pre-commit.com/

default_language_version:
  python: python3

repos:
  # 基本的なフック
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: debug-statements
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: name-tests-test
        args: ['--pytest-test-first']
      - id: requirements-txt-fixer
      - id: check-ast
      - id: check-builtin-literals
      - id: check-docstring-first

  # Ruff - 高速なPythonリンター＆フォーマッター
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.14
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi, jupyter]
      - id: ruff-format
        types_or: [python, pyi, jupyter]

  # mypy - 型チェック
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests
          - types-PyYAML
          - types-toml
        args:
          - --ignore-missing-imports
          - --no-implicit-optional
          - --warn-redundant-casts
          - --warn-unused-ignores
          - --warn-return-any
          - --warn-unreachable
          - --pretty
        exclude: ^(tests/|docs/|scripts/)

  # Bandit - セキュリティチェック
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        args: ['-ll', '-r', 'src']
        exclude: ^tests/

  # isort - インポート順序の整理（Ruffと併用）
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black", "--filter-files"]

  # Markdown lint
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.38.0
    hooks:
      - id: markdownlint
        args: ['--fix']

  # YAML lint
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.33.0
    hooks:
      - id: yamllint
        args: ['-d', '{extends: relaxed, rules: {line-length: {max: 120}}}']

  # Shell script lint
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck

  # Secrets検出
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package-lock.json

# カスタムローカルフック
  - repo: local
    hooks:
      # pytest
      - id: pytest-check
        name: pytest
        entry: pytest tests/ -q --tb=short
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
      
      # TODO/FIXMEチェック
      - id: check-todos
        name: Check TODOs
        entry: python scripts/check_todos.py
        language: system
        pass_filenames: false
        always_run: true
      
      # セキュリティスキャン
      - id: security-check
        name: Security Check
        entry: python scripts/check_no_secrets.py
        language: system
        pass_filenames: false
        always_run: true
      
      # 依存関係チェック
      - id: requirements-check
        name: Check requirements
        entry: bash -c "pip freeze | diff requirements.txt - || true"
        language: system
        pass_filenames: false

# 設定
fail_fast: false
exclude: |
  (?x)^(
    .*\.egg-info/.*|
    \.git/.*|
    \.venv/.*|
    venv/.*|
    __pycache__/.*|
    \.pytest_cache/.*|
    \.mypy_cache/.*|
    \.ruff_cache/.*|
    \.coverage|
    htmlcov/.*|
    dist/.*|
    build/.*|
    node_modules/.*|
    \.sessions/.*|
    \.env|
    \.env\.mcp
  )$
