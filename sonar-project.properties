# SonarQube Configuration for Claude Code Template MCP

# Project identification
sonar.projectKey=claude-code-template-mcp
sonar.projectName=Claude Code Template MCP
sonar.projectVersion=1.0

# Source code configuration
sonar.sources=src
sonar.tests=tests
sonar.language=py
sonar.sourceEncoding=UTF-8

# Python specific configuration
sonar.python.version=3.11

# Exclusions
sonar.exclusions=**/__pycache__/**,**/venv/**,**/*.pyc,**/tests/**,**/test_*.py

# Test coverage (optional - if you have coverage reports)
# sonar.python.coverage.reportPaths=coverage.xml

# SonarQube server
sonar.host.url=http://localhost:9000

# Authentication (will be set via command line)
# sonar.login=YOUR_TOKEN_HERE