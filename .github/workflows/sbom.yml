name: SBOM Generation and Vulnerability Scan

on:
    push:
        branches: [main]
        tags:
            - "v*"
    pull_request:
        branches: [main]
    schedule:
        # Run daily at 3 AM UTC
        - cron: "0 3 * * *"
    workflow_dispatch:

jobs:
    sbom-syft:
        name: Generate SBOM with Syft
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Generate SBOM with Syft
              uses: anchore/sbom-action@v0
              with:
                  path: .
                  format: spdx-json
                  output-file: sbom-spdx.json

            - name: Generate CycloneDX SBOM
              uses: anchore/sbom-action@v0
              with:
                  path: .
                  format: cyclonedx-json
                  output-file: sbom-cyclonedx.json

            - name: Upload SBOM artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: sbom-files
                  path: |
                      sbom-spdx.json
                      sbom-cyclonedx.json
                  retention-days: 30

            # Upload SBOM to release if it's a tag
            - name: Upload SBOM to release
              if: startsWith(github.ref, 'refs/tags/')
              uses: softprops/action-gh-release@v1
              with:
                  files: |
                      sbom-spdx.json
                      sbom-cyclonedx.json

    vulnerability-scan:
        name: Vulnerability Scan with Grype
        runs-on: ubuntu-latest
        needs: sbom-syft
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Download SBOM
              uses: actions/download-artifact@v4
              with:
                  name: sbom-files

            - name: Scan for vulnerabilities with Grype
              uses: anchore/scan-action@v3
              id: scan
              with:
                  sbom: sbom-spdx.json
                  fail-build: false
                  severity-cutoff: critical
                  output-format: table

            - name: Upload Grype report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: grype-report
                  path: ${{ steps.scan.outputs.report }}
                  retention-days: 30

    microsoft-sbom:
        name: Generate SBOM with Microsoft Tool
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "8.0.x"

            - name: Install Microsoft SBOM Tool
              run: |
                  dotnet tool install --global Microsoft.Sbom.DotNetTool

            - name: Generate SBOM
              run: |
                  sbom-tool generate \
                    -b . \
                    -bc . \
                    -pn "claude-code-template-mcp" \
                    -pv "2.0.0" \
                    -ps "Anthropic" \
                    -nsb https://github.com/${{ github.repository }} \
                    -m .

            - name: Upload Microsoft SBOM
              uses: actions/upload-artifact@v4
              with:
                  name: microsoft-sbom
                  path: _manifest/
                  retention-days: 30

    dependency-review:
        name: Dependency Review
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request'
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Dependency Review
              uses: actions/dependency-review-action@v4
              with:
                  # Fail the workflow if high or critical vulnerabilities are found
                  fail-on-severity: high
                  # Allow specific licenses (customize as needed)
                  allow-licenses: MIT, Apache-2.0, BSD-3-Clause, BSD-2-Clause, ISC
                  # Deny specific licenses (customize as needed)
                  deny-licenses: GPL-3.0, AGPL-3.0
                  # Check for vulnerabilities in runtime dependencies
                  base-ref: ${{ github.event.pull_request.base.sha }}
                  head-ref: ${{ github.event.pull_request.head.sha }}
