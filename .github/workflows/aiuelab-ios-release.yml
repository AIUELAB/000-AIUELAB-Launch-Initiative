name: AIUELAB iOS App Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      app_name:
        description: "App Name"
        required: true
        type: string
      version:
        description: "Version"
        required: true
        type: string

jobs:
  build-and-release:
    name: Build and Release iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Cache CocoaPods
        uses: actions/cache@v3
        with:
          path: Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install Dependencies
        run: |
          if [ -f "Podfile" ]; then
            pod install
          fi

      - name: Build iOS App
        env:
          APP_NAME: ${{ github.event.inputs.app_name || github.event.repository.name }}
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          xcodebuild -workspace "$APP_NAME.xcworkspace" \
            -scheme "$APP_NAME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$PWD/build/$APP_NAME.xcarchive" \
            clean archive

      - name: Export IPA
        env:
          APP_NAME: ${{ github.event.inputs.app_name || github.event.repository.name }}
        run: |
          xcodebuild -exportArchive \
            -archivePath "$PWD/build/$APP_NAME.xcarchive" \
            -exportOptionsPlist "$PWD/ExportOptions.plist" \
            -exportPath "$PWD/build"

      - name: Upload to TestFlight
        if: success()
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          xcrun altool --upload-app \
            -f "build/*.ipa" \
            -t ios \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/*.ipa
          generate_release_notes: true
          body: |
            ## 🚀 AIUELAB iOS App Release

            ### 📱 App Information
            - **App**: ${{ github.event.inputs.app_name || github.event.repository.name }}
            - **Version**: ${{ github.event.inputs.version || github.ref_name }}
            - **Build**: ${{ github.run_number }}

            ### 📝 What's New
            - Feature updates
            - Bug fixes
            - Performance improvements

            ### 🔗 Links
            - [AIUELAB Website](https://aiuelab.com)
            - [TestFlight](https://testflight.apple.com)

            ---
            *Automated release by AIUELAB CI/CD*

      - name: Notify Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            iOS App Release: ${{ github.event.inputs.app_name || github.event.repository.name }}
            Version: ${{ github.event.inputs.version || github.ref_name }}
            Status: ${{ job.status }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  update-website:
    name: Update AIUELAB Website
    needs: build-and-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Website
        uses: actions/checkout@v3
        with:
          repository: AIUELAB/aiuelab.com
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update App Listing
        run: |
          # アプリ情報をウェブサイトに追加
          echo "TODO: Update app listing on aiuelab.com"

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
