name: Secret Rotation Management

on:
  schedule:
    # 毎週月曜日午前9時に実行（JST 18:00）
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  check-secret-rotation:
    name: Check Secret Rotation Schedule
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check Secret Rotation Requirements
        uses: actions/github-script@v7
        with:
          script: |
            const rotationSchedule = {
              // Critical production secrets - 30 days
              critical: {
                maxAgeDays: 30,
                secrets: [
                  'PRODUCTION_API_KEY',
                  'DATABASE_PASSWORD',
                  'JWT_SECRET',
                  'ENCRYPTION_KEY'
                ]
              },
              // High-risk secrets - 60 days
              high: {
                maxAgeDays: 60,
                secrets: [
                  'STAGING_API_KEY',
                  'SMTP_PASSWORD',
                  'OAUTH_CLIENT_SECRET',
                  'WEBHOOK_SECRET'
                ]
              },
              // Standard secrets - 90 days
              standard: {
                maxAgeDays: 90,
                secrets: [
                  'GITHUB_TOKEN',
                  'NPM_TOKEN',
                  'DOCKER_PASSWORD',
                  'SLACK_TOKEN'
                ]
              },
              // Long-lived tokens - 365 days
              longLived: {
                maxAgeDays: 365,
                secrets: [
                  'AWS_ROLE_ARN',
                  'GCP_SERVICE_ACCOUNT',
                  'AZURE_CLIENT_ID'
                ]
              }
            };
            
            const warnings = [];
            const errors = [];
            
            // この例では、シークレットの最終更新日を追跡する仕組みが必要
            // 実際の実装では、外部のシークレット管理システムと統合します
            
            console.log('🔐 Secret Rotation Check Started');
            console.log('================================');
            
            for (const [level, config] of Object.entries(rotationSchedule)) {
              console.log(`\n📋 Checking ${level} secrets (max age: ${config.maxAgeDays} days)`);
              for (const secret of config.secrets) {
                // ここで実際の年齢チェックを実装
                console.log(`  - ${secret}: [Check would occur here]`);
              }
            }
            
            // 結果をIssueとして報告
            if (warnings.length > 0 || errors.length > 0) {
              const issueBody = `
              # 🔐 Secret Rotation Report
              
              ## ⚠️ Warnings (Approaching Rotation)
              ${warnings.length > 0 ? warnings.join('\n') : 'None'}
              
              ## 🚨 Errors (Overdue for Rotation)
              ${errors.length > 0 ? errors.join('\n') : 'None'}
              
              ## Rotation Guidelines
              - **Critical**: 30 days (production keys, passwords)
              - **High Risk**: 60 days (staging keys, OAuth secrets)
              - **Standard**: 90 days (tokens, API keys)
              - **Long-lived**: 365 days (cloud provider credentials)
              
              ## Next Steps
              1. Rotate overdue secrets immediately
              2. Plan rotation for secrets approaching their deadline
              3. Update secret metadata after rotation
              4. Verify new secrets are working correctly
              `;
              
              // Create or update issue
              const issues = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: 'secret-rotation',
                state: 'open'
              });
              
              if (issues.data.length > 0) {
                // Update existing issue
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issues.data[0].number,
                  body: issueBody
                });
              } else {
                // Create new issue
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: '🔐 Secret Rotation Required',
                  body: issueBody,
                  labels: ['secret-rotation', 'security']
                });
              }
            }

  validate-oidc-config:
    name: Validate OIDC Configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check OIDC Provider Configuration
        run: |
          echo "🔍 Checking OIDC configuration..."
          echo "================================"
          
          # AWS OIDC検証
          if [ -n "${{ secrets.AWS_ROLE_ARN }}" ]; then
            echo "✅ AWS OIDC Role ARN configured"
          else
            echo "⚠️  AWS OIDC Role ARN not configured"
          fi
          
          # GCP OIDC検証
          if [ -n "${{ secrets.WIF_PROVIDER }}" ] && [ -n "${{ secrets.WIF_SERVICE_ACCOUNT }}" ]; then
            echo "✅ GCP Workload Identity configured"
          else
            echo "⚠️  GCP Workload Identity not configured"
          fi
          
          # Azure OIDC検証
          if [ -n "${{ secrets.AZURE_CLIENT_ID }}" ] && [ -n "${{ secrets.AZURE_TENANT_ID }}" ]; then
            echo "✅ Azure OIDC configured"
          else
            echo "⚠️  Azure OIDC not configured"
          fi

  audit-secret-usage:
    name: Audit Secret Usage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Analyze Workflow Secret Usage
        run: |
          echo "📊 Analyzing secret usage in workflows..."
          echo "========================================="
          
          # ワークフローファイルでのシークレット使用を分析
          for workflow in .github/workflows/*.yml; do
            echo ""
            echo "📄 $(basename $workflow):"
            
            # secrets.を含む行を検索
            grep -n "secrets\." "$workflow" | while read -r line; do
              echo "  Line $line"
            done || echo "  No secrets used"
          done
      
      - name: Check for Hardcoded Values
        run: |
          echo ""
          echo "🔍 Checking for potential hardcoded secrets..."
          echo "=============================================="
          
          # 一般的なパターンをチェック
          patterns=(
            "password.*=.*['\"]"
            "api[_-]?key.*=.*['\"]"
            "token.*=.*['\"]"
            "secret.*=.*['\"]"
          )
          
          for pattern in "${patterns[@]}"; do
            echo ""
            echo "Pattern: $pattern"
            grep -r -i "$pattern" --include="*.yml" --include="*.yaml" \
              --include="*.json" --include="*.env*" \
              --exclude-dir=node_modules --exclude-dir=venv \
              . || echo "  ✅ No matches found"
          done

  generate-rotation-report:
    name: Generate Rotation Report
    runs-on: ubuntu-latest
    needs: [check-secret-rotation, validate-oidc-config, audit-secret-usage]
    if: always()
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Comprehensive Report
        run: |
          cat > secret-rotation-report.md << 'EOF'
          # Secret Management Report
          
          Generated: $(date)
          Repository: ${{ github.repository }}
          
          ## Executive Summary
          
          This report provides an overview of secret management practices and rotation status.
          
          ## Rotation Status
          
          | Secret Category | Max Age | Status |
          |----------------|---------|---------|
          | Critical | 30 days | ⏳ Check Required |
          | High Risk | 60 days | ⏳ Check Required |
          | Standard | 90 days | ⏳ Check Required |
          | Long-lived | 365 days | ⏳ Check Required |
          
          ## OIDC Adoption Status
          
          | Provider | Status | Benefits |
          |----------|--------|----------|
          | AWS | 🔧 Configuration Needed | No long-lived credentials |
          | GCP | 🔧 Configuration Needed | Automatic token rotation |
          | Azure | 🔧 Configuration Needed | Fine-grained access control |
          
          ## Recommendations
          
          1. **Immediate Actions**
             - Review and rotate any overdue secrets
             - Implement OIDC for cloud providers
             - Remove any hardcoded credentials
          
          2. **Short-term (1-2 weeks)**
             - Set up automated rotation reminders
             - Document rotation procedures
             - Train team on secret management
          
          3. **Long-term (1-3 months)**
             - Implement HashiCorp Vault or AWS Secrets Manager
             - Automate secret rotation where possible
             - Regular security audits
          
          ## Best Practices Checklist
          
          - [ ] All secrets stored as GitHub Secrets or environment variables
          - [ ] No hardcoded credentials in code
          - [ ] OIDC configured for cloud providers
          - [ ] Regular rotation schedule enforced
          - [ ] Secret usage audited and minimized
          - [ ] Principle of least privilege applied
          - [ ] Secrets scanned in CI/CD pipeline
          - [ ] Incident response plan for compromised secrets
          
          ## Compliance Notes
          
          - SOC 2: Requires regular secret rotation
          - ISO 27001: Mandates access control and key management
          - PCI DSS: Specific requirements for encryption keys
          - GDPR: Data protection through proper secret management
          
          EOF
      
      - name: Upload Report
        uses: actions/upload-artifact@v3
        with:
          name: secret-rotation-report
          path: secret-rotation-report.md
      
      - name: Send Notification
        if: github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            // Slack, Email, or other notification methods
            console.log('📧 Rotation report would be sent to security team');

  # Example: Vault Integration
  vault-sync:
    name: Sync with HashiCorp Vault
    runs-on: ubuntu-latest
    if: false  # Disabled by default - enable when Vault is configured
    steps:
      - uses: actions/checkout@v4
      
      - name: Import Secrets from Vault
        uses: hashicorp/vault-action@v2
        with:
          url: ${{ secrets.VAULT_URL }}
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            secret/data/ci/aws accessKey | AWS_ACCESS_KEY_ID ;
            secret/data/ci/aws secretKey | AWS_SECRET_ACCESS_KEY ;
            secret/data/ci/github token | GITHUB_TOKEN