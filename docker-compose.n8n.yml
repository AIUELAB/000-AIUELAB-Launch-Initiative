version: "3.8"

services:
    n8n:
        image: n8nio/n8n:latest
        container_name: n8n-${PROJECT_NAME:-default}
        ports:
            - "${N8N_PORT:-5678}:5678"
        environment:
            - N8N_BASIC_AUTH_ACTIVE=true
            - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
            - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-password}
            - N8N_HOST=localhost
            - N8N_PORT=5678
            - N8N_PROTOCOL=http
            - WEBHOOK_URL=http://localhost:${N8N_PORT:-5678}/
            - DB_SQLITE_POOL_SIZE=${DB_SQLITE_POOL_SIZE:-5}
            - N8N_RUNNERS_ENABLED=${N8N_RUNNERS_ENABLED:-true}
        volumes:
            - ./.n8n:/home/node/.n8n
        restart: unless-stopped
