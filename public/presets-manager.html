<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Preset Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif; margin: 24px; }
    form { display: grid; gap: 8px; max-width: 640px; }
    input, textarea, select { padding: 8px; font-size: 14px; }
    button { padding: 8px 12px; font-size: 14px; }
    pre { background: #f6f8fa; padding: 12px; border-radius: 6px; overflow: auto; }
  </style>
</head>
<body>
  <h1>n8n Preset Manager</h1>
  <form id="presetForm">
    <input type="text" id="title" placeholder="タイトル" required />
    <input type="text" id="path" placeholder="/webhook/xxx またはパス名のみ (xxx)" required />
    <textarea id="description" placeholder="説明"></textarea>
    <select id="category">
      <option value="task">タスク</option>
      <option value="notification">通知</option>
      <option value="automation">自動化</option>
    </select>
    <button type="submit">追加</button>
  </form>

  <h3>JSON</h3>
  <pre id="output"></pre>

  <script>
    const state = { version: "1.0.0", presets: [] };
    const form = document.getElementById('presetForm');
    const output = document.getElementById('output');

    form.onsubmit = (e) => {
      e.preventDefault();
      const title = document.getElementById('title').value.trim();
      const rawPath = document.getElementById('path').value.trim();
      const description = document.getElementById('description').value.trim();
      const category = document.getElementById('category').value;

      if (!title || !rawPath) return;

      const path = rawPath.replace(/^https?:\/\/[^/]+\//, '').replace(/^\/?(webhook|webhook-test)\//, '').replace(/^\//,'');

      const preset = {
        id: Date.now().toString(),
        title,
        path,
        description,
        category,
        icon: "⚡",
        defaultPayload: {},
        requiredFields: [],
        optionalFields: []
      };

      state.presets.push(preset);
      state.updated = new Date().toISOString();
      output.textContent = JSON.stringify(state, null, 2);

      form.reset();
    };
  </script>
</body>
</html>
